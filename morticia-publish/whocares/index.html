<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhoCares Jazz Band - Probeaufnahmen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
            color: #f4a261;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .subtitle {
            text-align: center;
            color: #e9c46a;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .track {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, background 0.2s;
        }
        .track:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.15);
        }
        .track-title {
            font-size: 1.3rem;
            margin-bottom: 0.8rem;
            color: #e9c46a;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .track-title::before {
            content: "🎵";
        }
        audio {
            width: 100%;
            height: 40px;
            border-radius: 20px;
        }
        audio::-webkit-media-controls-panel {
            background: #f4a261;
        }
        .footer {
            text-align: center;
            margin-top: 3rem;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎷 WhoCares Jazz Band</h1>
        <p class="subtitle">Probeaufnahmen vom 26. Februar 2026</p>

        <div class="track">
            <div class="track-title">Besame Mucho</div>
            <audio controls>
                <source src="Besame%20Mucho.MP3" type="audio/mpeg">
                Ihr Browser unterstützt das Audio-Element nicht.
            </audio>
        </div>

        <div class="track">

        </div>

        <div class="track">

                Ihr Browser unterstützt das Audio-Element nicht.
            </audio>
        </div>

        <div class="track">
            <div class="track-title">My Funny Valentine</div>
            <audio controls>
                <source src="My%20Funny%20Valentine.MP3" type="audio/mpeg">
                Ihr Browser unterstützt das Audio-Element nicht.
            </audio>
        </div>

        <div class="track">
            <div class="track-title">Recado</div>
            <audio controls>
                <source src="Recado.MP3" type="audio/mpeg">
                Ihr Browser unterstützt das Audio-Element nicht.

        </div>

        <div class="track">
            <div class="track-title">Route 66</div>
            <audio controls>
                <source src="Route66.MP3" type="audio/mpeg">
                Ihr Browser unterstützt das Audio-Element nicht.
            </audio>
        </div>

        <div class="track">
            <div class="track-title">This Masquerade</div>

                <source src="This%20Masquerade.MP3" type="audio/mpeg">
                Ihr Browser unterstützt das Audio-Element nicht.
            </audio>
        </div>

        <div class="footer">
            <p>WhoCares Jazz Band 🎺</p>
        </div>
    </div>
</body>
</html>
